# ============================================================
# TASK:
# Create a new HorizontalPodAutoscaler (HPA) named apache-server
# in the autoscale namespace. This HPA must target the existing
# Deployment called apache-server in the autoscale namespace.
#
# - Set the HPA to target for 50% CPU usage per pod.
# - Configure hpa to have at min 1 Pod and no more than 4 Pods.
# - Set the downscale stabilization window to 30 seconds.
# ============================================================
#
# SOLUTION:
#
# 1. HPA 생성
#    아래 HPA 리소스를 적용한다.
#    kubectl apply -f cka-hpa.yaml
#
# 2. 핵심 포인트
#    - averageUtilization: 50          ← CPU 50% 목표
#    - minReplicas: 1 / maxReplicas: 4
#    - behavior.scaleDown
#        stabilizationWindowSeconds: 30 ← downscale 안정화 창
#
#    ※ kubectl autoscale 명령어로는 stabilizationWindowSeconds를
#      설정할 수 없으므로 반드시 YAML로 적용해야 한다.
#      (아래 명령어는 참고용)
#      kubectl autoscale -n autoscale deployment apache-server \
#        --cpu-percent=50 --min=1 --max=4
#
# 3. 확인
#    kubectl get hpa -n autoscale
#    kubectl describe hpa apache-server -n autoscale
#
# ============================================================

# [세팅] Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: autoscale

---

# [세팅] Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apache-server
  namespace: autoscale
spec:
  selector:
    matchLabels:
      app: apache-server
  template:
    metadata:
      labels:
        app: apache-server
    spec:
      containers:
        - name: apache-server
          image: registry.k8s.io/hpa-example
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: 100m
            requests:
              cpu: 50m

---

# [풀이] HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: apache-server
  namespace: autoscale
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: apache-server
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 30