# ============================================================
# TASK:
# Migrate an existing web application from Ingress to Gateway API.
# We must maintain HTTP success.
#
# A GatewayClass named nginx is installed in the cluster.
# First, create a Gateway named web-gateway with hostname
# gateway.web.k8s.local that maintains the existing TLS and listener
# configuration from the existing Ingress resource named web.
#
# Next, create an HTTPRoute named web-route with hostname
# gateway.web.k8s.local that maintains the existing routing rules from the
# current Ingress resource named web.
#
# You can test your Gateway API configuration with the following command:
# [candidate@cka0001]$ curl -k https://gateway.web.k8s.local
# Finally, delete the existing Ingress resource named web.
#
# ============================================================
# SOLUTION STEPS:
#
# 1. GatewayClass 이름 확인
#    kubectl get gatewayclass
#
# 2. 기존 Ingress 내용 확인 (네임스페이스, TLS secretName,
#    backend service 이름/포트, host, path 규칙 전부 여기서 가져옴)
#    kubectl get get ingress web -o yaml
#
# 3. 아래 Gateway + HTTPRoute 적용
#
# 4. 테스트
#    curl -k https://gateway.web.k8s.local
#    (NodePort 환경이면 포트 포함: curl -k https://gateway.web.k8s.local:<node-port>)
#
# 5. 정상 동작 확인되면 기존 Ingress 삭제
#    kubectl delete ingress web 
#
# ------------------------------------------------------------
# NOTE:
# - namespace는 반드시 기존 Ingress와 동일하게 맞출 것
#   (Gateway/HTTPRoute/Service/Secret이 모두 같은 네임스페이스에
#   있어야 별도 ReferenceGrant 없이 동작함)
# - certificateRefs.name은 기존 Ingress의 spec.tls[].secretName 값 그대로 사용
# - backendRefs.name/port는 기존 Ingress의 backend.service.name/port.number 값 그대로 사용
# - HTTPRoute의 matches.path는 기존 Ingress rules의 path/pathType을 그대로 변환
#   (pathType: Prefix -> type: PathPrefix, pathType: Exact -> type: Exact)
# ============================================================

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: web-gateway
  namespace: default          # TODO: 기존 Ingress와 동일한 네임스페이스로 변경
spec:
  gatewayClassName: nginx
  listeners:
  - name: https
    protocol: HTTPS
    port: 443 # 443으로 변경 필요
    hostname: gateway.web.k8s.local
    tls:
      mode: Terminate
      certificateRefs:
      - kind: Secret
        group: ""
        name: web-cert         # TODO: 기존 Ingress의 tls.secretName 값으로 변경
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: web-route
  namespace: default          # TODO: 기존 Ingress와 동일한 네임스페이스로 변경
spec:
  parentRefs:
  - name: web-gateway
    sectionName: https
  hostnames:
  - "gateway.web.k8s.local"
  rules:
  - matches:
    - path:
        type: PathPrefix       # 기존 Ingress pathType과 동일하게 조정
        value: /               # 기존 Ingress path 값으로 변경
    backendRefs:
    - name: web                # TODO: 기존 Ingress backend service 이름으로 변경
      port: 80                 # TODO: 기존 Ingress backend service port로 변경